  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#666">Flujo de valor entre actores del sistema educativo adaptativo</text>

  <!-- ══════ ACTORS ══════ -->

  <!-- ADMIN -->
  <rect x="30" y="90" width="150" height="680" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
