  <rect x="222" y="309" width="156" height="48" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="300" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Analíticas</text>
  <text x="300" y="342" text-anchor="middle" font-size="10" fill="#14532d">de su curso</text>

  <rect x="222" y="367" width="156" height="48" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="300" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Predicciones riesgo</text>
  <text x="300" y="400" text-anchor="middle" font-size="10" fill="#14532d">de sus estudiantes</text>

  <rect x="222" y="425" width="156" height="48" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="300" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Recibe alertas</text>
  <text x="300" y="458" text-anchor="middle" font-size="10" fill="#14532d">estudiantes en riesgo</text>

  <rect x="222" y="483" width="156" height="48" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="300" y="502" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Asignar estudiantes</text>
  <text x="300" y="516" text-anchor="middle" font-size="10" fill="#14532d">a sus cursos</text>

  <!-- SISTEMA (CENTRO) -->
  <rect x="430" y="90" width="340" height="680" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">⚙️ Sistema Andamiaje Python</text>
  <line x1="430" y1="125" x2="770" y2="125" stroke="#d97706" stroke-width="1"/>

  <!-- Sistema boxes -->
  <rect x="445" y="135" width="150" height="54" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="520" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">Auth JWT</text>
  <text x="520" y="169" text-anchor="middle" font-size="10" fill="#78350f">3 roles · bcrypt</text>
  <text x="520" y="181" text-anchor="middle" font-size="10" fill="#78350f">token 24h</text>

  <rect x="610" y="135" width="148" height="54" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="684" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">Gestión Preguntas</text>
  <text x="684" y="169" text-anchor="middle" font-size="10" fill="#78350f">CRUD + CSV import</text>
  <text x="684" y="181" text-anchor="middle" font-size="10" fill="#78350f">seed 30 ejercicios</text>

  <rect x="445" y="202" width="313" height="60" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="601" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">🤖 Generación de Andamiaje (Claude Haiku)</text>
  <text x="601" y="237" text-anchor="middle" font-size="10" fill="#78350f">3 niveles por pregunta: mínimo · parcial · completo</text>
  <text x="601" y="251" text-anchor="middle" font-size="10" fill="#78350f">en español · pedagógico · personalizado por nivel</text>

  <rect x="445" y="275" width="313" height="72" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="601" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">💬 Chat Adaptativo</text>
  <text x="601" y="309" text-anchor="middle" font-size="10" fill="#78350f">Selección inteligente de ejercicio por historial</text>
  <text x="601" y="323" text-anchor="middle" font-size="10" fill="#78350f">Progresión: mínimo → parcial → completo</text>
  <text x="601" y="337" text-anchor="middle" font-size="10" fill="#78350f">Evaluación: pytest + BLEU + Haiku score</text>

  <rect x="445" y="360" width="313" height="60" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="601" y="380" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">📊 Scoring por Corte</text>
  <text x="601" y="395" text-anchor="middle" font-size="10" fill="#78350f">pass_tests×0.40 + haiku×0.30 + bleu×0.20 + eficiencia×0.10</text>
  <text x="601" y="409" text-anchor="middle" font-size="10" fill="#78350f">Guarda: nombre · semestre · curso · programa · corte</text>

  <rect x="445" y="433" width="313" height="54" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="601" y="453" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">🗺️ Ruta de Aprendizaje (Haiku)</text>
  <text x="601" y="467" text-anchor="middle" font-size="10" fill="#78350f">temas_fuertes · temas_a_reforzar</text>
  <text x="601" y="481" text-anchor="middle" font-size="10" fill="#78350f">ejercicios_recomendados · recursos_externos</text>

  <rect x="445" y="500" width="148" height="54" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="519" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">📈 Analíticas</text>
  <text x="519" y="534" text-anchor="middle" font-size="10" fill="#78350f">heatmap · cohortes</text>
  <text x="519" y="548" text-anchor="middle" font-size="10" fill="#78350f">abandono · distribución</text>

  <rect x="608" y="500" width="150" height="54" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="683" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">🔮 Predicción Riesgo</text>
  <text x="683" y="534" text-anchor="middle" font-size="10" fill="#78350f">RandomForest · score 0–1</text>
  <text x="683" y="548" text-anchor="middle" font-size="10" fill="#78350f">alertas automáticas</text>

  <rect x="445" y="567" width="313" height="48" rx="6" fill="#fde68a" stroke="#d97706"/>
  <text x="601" y="587" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">💡 Insights Narrativos (Haiku)</text>
  <text x="601" y="601" text-anchor="middle" font-size="10" fill="#78350f">"El 68% falla en decoradores en corte 1. Recomendación: ..."</text>

  <rect x="445" y="628" width="313" height="48" rx="6" fill="#fed7aa" stroke="#ea580c"/>
  <text x="601" y="644" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c2d12">📧 Email SendGrid — Automático</text>
  <text x="601" y="658" text-anchor="middle" font-size="10" fill="#7c2d12">Se envía al calcular evaluación · reenvío manual disponible</text>

