  <text x="105" y="226" text-anchor="middle" font-size="10" fill="#0c4a6e">y asignar docentes</text>

  <rect x="42" y="251" width="126" height="48" rx="6" fill="#bae6fd" stroke="#0284c7"/>
  <text x="105" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c4a6e">Analíticas</text>
  <text x="105" y="284" text-anchor="middle" font-size="10" fill="#0c4a6e">globales</text>

  <rect x="42" y="309" width="126" height="48" rx="6" fill="#bae6fd" stroke="#0284c7"/>
  <text x="105" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c4a6e">Predicciones</text>
  <text x="105" y="342" text-anchor="middle" font-size="10" fill="#0c4a6e">de riesgo global</text>

  <rect x="42" y="367" width="126" height="48" rx="6" fill="#bae6fd" stroke="#0284c7"/>
  <text x="105" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c4a6e">Alertas</text>
  <text x="105" y="400" text-anchor="middle" font-size="10" fill="#0c4a6e">tempranas globales</text>

