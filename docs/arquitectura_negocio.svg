  <rect x="222" y="193" width="156" height="48" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="300" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Importar CSV</text>
  <text x="300" y="226" text-anchor="middle" font-size="10" fill="#14532d">masivo de preguntas</text>

  <rect x="222" y="251" width="156" height="48" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
