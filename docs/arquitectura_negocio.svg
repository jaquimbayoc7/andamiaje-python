  <rect x="822" y="441" width="156" height="48" rx="6" fill="#ddd6fe" stroke="#7c3aed"/>
  <text x="900" y="460" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b0764">Recibir ruta</text>
