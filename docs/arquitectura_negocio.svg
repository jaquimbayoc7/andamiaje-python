  <rect x="822" y="499" width="156" height="48" rx="6" fill="#ddd6fe" stroke="#7c3aed"/>
  <text x="900" y="518" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b0764">Practicar recursos</text>
  <text x="900" y="532" text-anchor="middle" font-size="10" fill="#3b0764">recomendados por IA</text>

  <!-- RETROALIMENTACIÓN AL MODELO -->
  <rect x="1010" y="90" width="170" height="680" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
