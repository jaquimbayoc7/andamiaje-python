  <text x="105" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c4a6e">Exportar reporte</text>
  <text x="105" y="458" text-anchor="middle" font-size="10" fill="#0c4a6e">institucional</text>

  <!-- DOCENTE -->
  <rect x="210" y="90" width="180" height="680" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">👩‍🏫 Docente</text>
