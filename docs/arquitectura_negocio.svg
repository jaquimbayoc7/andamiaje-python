  <text x="900" y="300" text-anchor="middle" font-size="10" fill="#3b0764">Envía código Python</text>

  <rect x="822" y="325" width="156" height="48" rx="6" fill="#ddd6fe" stroke="#7c3aed"/>
  <text x="900" y="344" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b0764">Ver resultados</text>
  <text x="900" y="358" text-anchor="middle" font-size="10" fill="#3b0764">tests · score · feedback</text>

