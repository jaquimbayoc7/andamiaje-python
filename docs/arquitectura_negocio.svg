  <text x="1095" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">Mejora Continua</text>
  <line x1="1010" y1="130" x2="1180" y2="130" stroke="#db2777" stroke-width="1"/>

  <rect x="1022" y="140" width="146" height="54" rx="6" fill="#fbcfe8" stroke="#db2777"/>
  <text x="1095" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">Datos de desempeño</text>
  <text x="1095" y="174" text-anchor="middle" font-size="10" fill="#831843">se guardan en BD</text>
  <text x="1095" y="186" text-anchor="middle" font-size="9" fill="#831843">por estudiante + corte</text>

  <rect x="1022" y="206" width="146" height="54" rx="6" fill="#fbcfe8" stroke="#db2777"/>
  <text x="1095" y="226" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">Modelo ML</text>
  <text x="1095" y="240" text-anchor="middle" font-size="10" fill="#831843">se re-entrena cada</text>
  <text x="1095" y="252" text-anchor="middle" font-size="10" fill="#831843">50+ evaluaciones</text>

  <rect x="1022" y="272" width="146" height="54" rx="6" fill="#fbcfe8" stroke="#db2777"/>
  <text x="1095" y="292" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">Predicciones</text>
  <text x="1095" y="306" text-anchor="middle" font-size="10" fill="#831843">mejoran con más</text>
  <text x="1095" y="318" text-anchor="middle" font-size="10" fill="#831843">datos históricos</text>

  <rect x="1022" y="338" width="146" height="54" rx="6" fill="#fbcfe8" stroke="#db2777"/>
  <text x="1095" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">Docente ajusta</text>
  <text x="1095" y="372" text-anchor="middle" font-size="10" fill="#831843">preguntas según</text>
  <text x="1095" y="386" text-anchor="middle" font-size="10" fill="#831843">temas críticos</text>

  <rect x="1022" y="404" width="146" height="54" rx="6" fill="#fbcfe8" stroke="#db2777"/>
  <text x="1095" y="424" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">Ruta de aprendizaje</text>
  <text x="1095" y="438" text-anchor="middle" font-size="10" fill="#831843">personalizada por</text>
  <text x="1095" y="452" text-anchor="middle" font-size="10" fill="#831843">historial real</text>

  <!-- ARROWS between actors and system -->
  <!-- Admin → Sistema -->
  <line x1="180" y1="159" x2="430" y2="159" stroke="#0284c7" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="180" y1="217" x2="430" y2="217" stroke="#0284c7" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="180" y1="524" x2="430" y2="524" stroke="#0284c7" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Docente → Sistema -->
  <line x1="390" y1="159" x2="430" y2="159" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="390" y1="217" x2="445" y2="217" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="390" y1="333" x2="445" y2="333" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Sistema → Estudiante -->
  <line x1="770" y1="311" x2="810" y2="311" stroke="#d97706" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="770" y1="389" x2="810" y2="389" stroke="#d97706" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="770" y1="652" x2="810" y2="465" stroke="#d97706" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Estudiante → Sistema (feedback) -->
  <line x1="822" y1="279" x2="770" y2="311" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a4)"/>

  <!-- Sistema → Ciclo Mejora -->
  <line x1="770" y1="524" x2="1010" y2="167" stroke="#db2777" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a5)"/>
  <line x1="770" y1="580" x2="1010" y2="359" stroke="#db2777" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a5)"/>

  <!-- CORTES label -->
  <rect x="30" y="760" width="1150" height="78" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="50" y="780" font-size="11" font-weight="bold" fill="#475569">Datos registrados por evaluación:</text>
  <text x="50" y="796" font-size="10" fill="#334155">▸ nombre_completo   ▸ semestre   ▸ programa_académico   ▸ curso   ▸ corte (1er | 2do | 3er)   ▸ score_global</text>
  <text x="50" y="812" font-size="10" fill="#334155">▸ scores por tema (variables, listas, tuplas, diccionarios, sets, dataframes, funciones)</text>
  <text x="50" y="828" font-size="10" fill="#334155">▸ ruta_aprendizaje (JSONB)   ▸ enviada_email (auto)   ▸ en_riesgo (predicción ML)   ▸ temas_debiles   ▸ curso_asignado</text>

  <!-- Markers -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0284c7"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#d97706"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/></marker>
    <marker id="a5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#db2777"/></marker>
