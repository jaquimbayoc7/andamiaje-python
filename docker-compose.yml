services:
  db:
    image: postgres:16
    container_name: andamiaje-db
    environment:
      POSTGRES_USER: andamiaje
      POSTGRES_PASSWORD: andamiaje123
      POSTGRES_DB: andamiaje_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andamiaje -d andamiaje_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: andamiaje-api
    command: >
      sh -c "alembic upgrade head &&
             python -m backend.scripts.seed &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: andamiaje-app
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
